tags:
  - Conseillers

summary: Lier un professeur avec des conseillers ayant des matières communes
description: |
  Cette route permet de récupérer les conseillers qui partagent au moins
  une matière avec le professeur authentifié via son JWT.
  
  Note:  Le test de la méthode marche seulement pour l'identity fournie dans le login (codée en dur dans le dao),
  et ne montrera que les résultats pour l'enseignant dont le courriel est jcho@csdm.com. 
  Ses codes matieres sont 444-444 et 555-555.

security:
  - BearerAuth: []

responses:
  200:
    description: Liste des conseillers compatibles avec le professeur
    schema:
      type: object
      properties:
        prof:
          type: string
          example: prof@ecole.ca
        codesMatieres:
          type: array
          items:
            type: string
          example: ["MAT101", "INF201"]
        conseillers:
          type: array
          items:
            type: object
            properties:
              _id:
                type: string
                example: "65f0c1a2a4f1e4c123456789"
              nom:
                type: string
                example: Tremblay
              codesMatieres:
                type: array
                items:
                  type: string
                example: ["MAT101", "PHY102"]

  400:
    description: Utilisateur non authentifié

  404:
    description: Professeur non trouvé

  500:
    description: Erreur serveur
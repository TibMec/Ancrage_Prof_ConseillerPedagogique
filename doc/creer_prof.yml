tags:
  - Enseignants

summary: Créer un enseignant
description: |
  Cette route permet d'ajouter un enseignant à la base de données.
  Le professeur est validé avec le modèle Pydantic `Prof`.
  Le courriel doit être unique dans la collection.
  
  Validations importantes :
  - `courriel` doit être un email valide
  - `codesMatieres` doit être au format XXX-XXX
  - `password` doit contenir au moins une majuscule, une minuscule, un chiffre, un caractère spécial et faire 8 caractères minimum
  -  Aucun champ ne peut être vide

consumes:
  - application/json

parameters:
  - in: body
    name: body
    required: true
    description: Données du professeur à créer
    schema:
      type: object
      required:
        - courriel
        - password
        - codesMatieres
      properties:
        nom:
          type: string
          example: Shorter
        prenom:
          type: string
          example: Wayne
        courriel:
          type: string
          example: wayneshorter@geniussax.com
        password:
          type: string
          example: mdP123#*
        ecoles:
          type: array
          items:
            type: string
          example:
            - Ecole secondaire Rosemont
            - Ecole secondaire Pearson
        codesMatieres:
          type: array
          items:
            type: string
          example:
            - 634-101
            - 628-202

responses:
  201:
    description: Professeur créé avec succès
    schema:
      type: object
      properties:
        message:
          type: string
          example: prof créé avec succès
        prof:
          type: object
          properties:
            nom:
              type: string
              example: Shorter
            prenom:
              type: string
              example: Wayne
            courriel:
              type: string
              example: wayneshorter@geniussax.com
            password:
              type: string
              example: mdP123#*
            ecoles:
              type: array
              items:
                type: string
              example:
                - Ecole secondaire Rosemont
                - Ecole secondaire Pearson
            codesMatieres:
              type: array
              items:
                type: string
              example:
                - 634-101
                - 628-202
            dateCreation:
                type: date
                example: "Sun, 26 Feb 2026 16:41:33 GMT"

  400:
    description: Erreur de validation des données

  409:
    description: Courriel déjà utilisé